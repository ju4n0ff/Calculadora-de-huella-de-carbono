<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Energética Sostenible</title>
    <style>
        :root {
            --jade-dark: #004d40;
            --jade-medium: #00796b;
            --jade-light: #e0f2f1;
            --turquesa: #26a69a;
            --turquesa-glow: #80cbc4;
            --gold-gradient: linear-gradient(135deg, #ffe082 0%, #ffb300 50%, #ffa000 100%);
            --gold-hover: linear-gradient(135deg, #fff8e1 0%, #ffca28 100%);
            --dark-slate: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(38, 166, 154, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fondo místico y natural con degradados orgánicos cruzados */
            background: linear-gradient(135deg, #004d40 0%, #00796b 40%, #009688 70%, #80cbc4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            overflow-x: hidden;
            position: relative;
        }

        /* Destellos mágicos de fondo estilo Entre Páginas */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,224,130,0.15) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(38,166,154,0.2) 0%, transparent 70%);
            bottom: -5%;
            right: -5%;
            pointer-events: none;
        }

        /* Contenedor Principal (Efecto Cristal Esmerilado) */
        .window-container {
            width: 100%;
            max-width: 1150px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 77, 64, 0.4);
            border: 2px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: appAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appAppear {
            from { opacity: 0; transform: scale(0.96) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Barra de Navegación Superior Estilo Pestañas */
        .tabs-header {
            display: flex;
            background: linear-gradient(to bottom, #00332c, #004d40);
            padding: 12px 15px 0 15px;
            gap: 8px;
            border-bottom: 4px solid var(--turquesa);
        }

        .tab-button {
            flex: 1;
            padding: 16px 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #b2dfdb;
            border: 1px solid rgba(38, 166, 154, 0.3);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(0, 77, 64, 0.5);
        }

        .tab-button:hover {
            background: rgba(38, 166, 154, 0.2);
            color: white;
        }

        .tab-button.active {
            background: var(--gold-gradient);
            color: var(--jade-dark);
            border-color: #ffc107;
            box-shadow: 0 -4px 12px rgba(255, 179, 0, 0.3);
        }

        /* Cuerpo de la Aplicación */
        .window-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(224,242,241,0.4) 100%);
        }

        /* Caja contenedora del Inventario (Fieldset Mágico) */
        .fieldset-container {
            border: 2px solid var(--turquesa);
            border-radius: 14px;
            padding: 25px 20px 20px 20px;
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 4px 10px rgba(0, 77, 64, 0.03);
        }

        .fieldset-title {
            position: absolute;
            top: -14px;
            left: 25px;
            background: linear-gradient(90deg, var(--jade-dark), var(--jade-medium));
            color: white;
            padding: 4px 16px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 77, 64, 0.2);
            letter-spacing: 0.5px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Botones de Electrodomésticos */
        .appliance-btn {
            background: white;
            border: 1.5px solid #b2dfdb;
            padding: 12px 8px;
            font-size: 0.88rem;
            color: var(--jade-dark);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: all 0.25s ease;
        }

        .appliance-btn:hover {
            background: var(--jade-light);
            border-color: var(--turquesa);
            transform: translateY(-1px);
        }

        /* Estado Seleccionado Verde Jade/Turquesa Brillante */
        .appliance-btn.selected {
            background: linear-gradient(135deg, var(--turquesa) 0%, var(--jade-medium) 100%);
            border-color: var(--jade-dark);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 121, 107, 0.3), inset 0 2px 4px rgba(255,255,255,0.2);
        }

        /* Fila de Parámetros Inferiores */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-group {
            display: flex;
            gap: 4px;
            background: white;
            padding: 4px;
            border-radius: 30px;
            border: 2px solid var(--turquesa);
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 0.88rem;
            color: var(--jade-dark);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .radio-label input {
            accent-color: var(--jade-medium);
        }

        .radio-label:has(input:checked) {
            background: var(--jade-light);
        }

        .select-medidor {
            flex-grow: 1;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 2px solid var(--turquesa);
            border-radius: 30px;
            background-color: white;
            font-weight: 600;
            color: var(--jade-dark);
            outline: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .select-medidor:focus {
            box-shadow: 0 0 0 3px var(--turquesa-glow);
        }

        /* Panel de Acciones (Botones de Control) */
        .actions-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .btn-action {
            padding: 16px;
            font-size: 1.05rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: all 0.25s ease;
            text-align: center;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* El botón principal con tu degradado dorado */
        .btn-analizar {
            background: var(--gold-gradient);
            color: #4a3600;
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }
        .btn-analizar:hover {
            background: var(--gold-hover);
        }

        .btn-guardar {
            background: linear-gradient(135deg, var(--jade-dark) 0%, #00332c 100%);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-metodologia {
            background: linear-gradient(135deg, var(--turquesa) 0%, var(--jade-medium) 100%);
            color: white;
        }

        /* Consola de Resultados Mágica */
        .output-area {
            width: 100%;
            height: 200px;
            background: var(--dark-slate);
            border: 2px solid var(--jade-medium);
            border-radius: 14px;
            padding: 20px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: #a7f3d0; /* Letras verde menta claro tipo terminal limpia */
            resize: none;
            outline: none;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.3);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="window-container">
        <header class="tabs-header">
            <button class="tab-button active">Estimación Energética</button>
            <button class="tab-button">Seguimiento de Gestión</button>
            <button class="tab-button">Infraestructura Sostenible</button>
        </header>

        <main class="window-body">
            
            <section class="fieldset-container">
                <div class="fieldset-title">✨ Inventario Tecnológico para Nuevos Suministros</div>
                <div class="inventory-grid">
                    <button class="appliance-btn" onclick="toggleSelect(this)">Foco LED</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Televisor</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Refrigeradora</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Laptop</button>
                    
                    <button class="appliance-btn" onclick="toggleSelect(this)">Microondas</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Lavadora</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Plancha</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Secadora</button>
                    
                    <button class="appliance-btn" onclick="toggleSelect(this)">Ducha eléctrica</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Ventilador</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Aire acondicionado</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Horno eléctrico</button>
                    
                    <button class="appliance-btn" onclick="toggleSelect(this)">Cafetera</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Licuadora</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Router</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Consola</button>
                    
                    <button class="appliance-btn" onclick="toggleSelect(this)">Aspiradora</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Bomba de agua</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Cargador celular</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Equipo de sonido</button>
                    
                    <button class="appliance-btn" onclick="toggleSelect(this)">Impresora</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">PC de escritorio</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Purificador de aire</button>
                    <button class="appliance-btn" onclick="toggleSelect(this)">Calentador eléctrico</button>
                </div>
            </section>

            <section class="controls-row">
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="tipoPersona" value="natural" checked> P. Natural
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="tipoPersona" value="juridica"> P. Jurídica
                    </label>
                </div>

                <select class="select-medidor">
                    <option>Medidor Monofásico Inteligente</option>
                    <option>Medidor Trifásico Comercial</option>
                    <option>Medidor Bidireccional (Paneles Solares)</option>
                </select>
            </section>

            <section class="actions-row">
                <button class="btn-action btn-analizar" onclick="ejecutarAnalisis()">Analizar Consumo y CO2</button>
                <button class="btn-action btn-guardar">Guardar en Historial</button>
                <button class="btn-action btn-metodologia">Metodología (TXT)</button>
            </section>

            <textarea class="output-area" id="txtConsole" readonly placeholder="[Consola del Sistema] Selecciona los equipos del inventario y presiona 'Analizar Consumo y CO2' para desplegar las métricas ambientales..."></textarea>

        </main>
    </div>

    <script>
        function toggleSelect(button) {
            button.classList.toggle('selected');
        }

        function ejecutarAnalisis() {
            const seleccionados = document.querySelectorAll('.appliance-btn.selected');
            const tipoPersona = document.querySelector('input[name="tipoPersona"]:checked').value;
            const consoleArea = document.getElementById('txtConsole');
            
            if (seleccionados.length === 0) {
                consoleArea.value = ">>> [ALERTA] Por favor, selecciona al menos un componente tecnológico del inventario.";
                return;
            }

            let listaEquipos = [];
            seleccionados.forEach(btn => listaEquipos.push(btn.innerText));

            // Simulación matemática
            let kwhEstimado = seleccionados.length * 38.8; 
            let co2Estimado = kwhEstimado * 0.21; 

            consoleArea.value = `=====================================================================\n`;
            consoleArea.value += ` 🌱  REPORTE INTEGRAL DE ESTIMACIÓN ENERGÉTICA Y EMISIONES (CO2)\n`;
            consoleArea.value += `=====================================================================\n`;
            consoleArea.value += `> Tipo de Suministro : Persona ${tipoPersona.toUpperCase()}\n`;
            consoleArea.value += `> Ítems Evaluados    : [${seleccionados.length}] -> ${listaEquipos.join(', ')}\n`;
            consoleArea.value += `---------------------------------------------------------------------\n`;
            consoleArea.value += `>> CONSUMO ENERGÉTICO ESTIMADO : ${kwhEstimado.toFixed(2)} kWh / mes\n`;
            consoleArea.value += `>> HUELLA DE CARBONO GENERADA  : ${co2Estimado.toFixed(2)} kgCO₂ / mes\n`;
            consoleArea.value += `=====================================================================\n`;
            consoleArea.value += `>>> Análisis ecológico procesado correctamente de manera sostenible.`;
        }
    </script>
</body>
</html>
